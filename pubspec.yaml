name: sambhasha_app
description: A production-level messaging app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.2
  firebase_messaging: ^15.1.3
  google_sign_in: ^6.2.1
  flutter_local_notifications: ^17.2.2
  provider: ^6.1.2
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  intl: ^0.19.0
  timeago: ^3.7.0
  flutter_spinkit: ^5.2.1
  path_provider: ^2.1.4
  permission_handler: ^11.3.1
  file_picker: ^8.1.3
  uuid: ^4.4.0
  shared_preferences: ^2.3.2
  pinput: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
